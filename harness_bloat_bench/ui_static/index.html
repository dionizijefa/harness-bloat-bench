<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Harness Bloat Bench</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Harness Bloat Bench</h1>
          <p>Scheduler runs, live task state, and result history.</p>
        </div>
        <div class="topbar-actions">
          <span class="sync-pill" id="syncPill">Idle</span>
          <button class="tool-button" id="refreshButton" type="button" aria-label="Refresh">Refresh</button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <form id="runForm" class="run-form">
            <div class="form-title">
              <h2>New Run</h2>
              <button class="primary-button" type="submit">Start</button>
            </div>

            <fieldset>
              <legend>Dataset</legend>
              <label>
                <span>Dataset</span>
                <input name="dataset" value="terminal-bench/terminal-bench-2-1">
              </label>
              <label>
                <span>Dataset path</span>
                <input name="datasetPath" placeholder="optional local path">
              </label>
              <div class="two-col">
                <label>
                  <span>Include</span>
                  <input name="include" placeholder="terminal-bench/crack-7z-hash">
                </label>
                <label>
                  <span>Limit</span>
                  <input name="nTasks" type="number" min="0" step="1" value="1">
                </label>
              </div>
              <label>
                <span>Exclude</span>
                <input name="exclude" placeholder="comma separated globs">
              </label>
            </fieldset>

            <fieldset>
              <legend>Resources</legend>
              <div class="two-col">
                <label>
                  <span>Total CPU</span>
                  <input name="totalCpus" type="number" min="1" step="1" value="64">
                </label>
                <label>
                  <span>Reserve CPU</span>
                  <input name="reserveCpus" type="number" min="0" step="1" value="4">
                </label>
              </div>
              <div class="two-col">
                <label>
                  <span>Total memory</span>
                  <input name="totalMemory" value="128GB">
                </label>
                <label>
                  <span>Reserve memory</span>
                  <input name="reserveMemory" value="16GB">
                </label>
              </div>
              <div class="two-col">
                <label>
                  <span>Total storage</span>
                  <input name="totalStorage" value="1TB">
                </label>
                <label>
                  <span>Total GPU</span>
                  <input name="totalGpus" type="number" min="0" step="1" value="0">
                </label>
              </div>
            </fieldset>

            <fieldset>
              <legend>Agent</legend>
              <label>
                <span>Model</span>
                <input name="model" value="qwen/qwen3.7-max">
              </label>
              <div class="two-col">
                <label>
                  <span>Attempts</span>
                  <input name="nAttempts" type="number" min="1" step="1" value="1">
                </label>
                <label>
                  <span>Retries</span>
                  <input name="maxRetries" type="number" min="0" step="1" value="0">
                </label>
              </div>
              <label>
                <span>Harbor extra args</span>
                <input name="harborExtraArgs" placeholder="optional">
              </label>
            </fieldset>

            <fieldset>
              <legend>Mode</legend>
              <div class="switch-grid">
                <label class="check-row">
                  <input name="dryRun" type="checkbox">
                  <span>Dry run</span>
                </label>
                <label class="check-row">
                  <input name="fetch" type="checkbox" checked>
                  <span>Fetch dataset</span>
                </label>
                <label class="check-row">
                  <input name="openrouter" type="checkbox" checked>
                  <span>OpenRouter</span>
                </label>
                <label class="check-row">
                  <input name="yes" type="checkbox" checked>
                  <span>Auto yes</span>
                </label>
              </div>
            </fieldset>
          </form>
        </aside>

        <section class="workspace">
          <section class="metrics" id="metrics"></section>

          <section class="split">
            <div class="surface">
              <div class="section-heading">
                <h2>Runs</h2>
                <span id="runCount">0</span>
              </div>
              <div class="run-list" id="runList"></div>
            </div>

            <div class="surface">
              <div class="section-heading">
                <h2>Selected Run</h2>
                <button class="danger-button" id="cancelButton" type="button">Cancel</button>
              </div>
              <div id="runDetail" class="run-detail"></div>
            </div>
          </section>

          <section class="surface results-surface">
            <div class="section-heading">
              <h2>Results</h2>
              <div class="result-controls">
                <input id="resultFilter" placeholder="Filter task, model, status">
                <select id="resultLimit">
                  <option value="50">50 rows</option>
                  <option value="100" selected>100 rows</option>
                  <option value="250">250 rows</option>
                </select>
              </div>
            </div>
            <div class="chart" id="resultChart"></div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Task</th>
                    <th>Run</th>
                    <th>Status</th>
                    <th>Passed</th>
                    <th>Runtime</th>
                    <th>Resources</th>
                  </tr>
                </thead>
                <tbody id="resultTable"></tbody>
              </table>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
